<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--white:#fff;--border:#e2e2e2;
  --t1:#111;--t2:#555;--t3:#999;--blue:#2563eb;
  --green:#16a34a;--yellow:#d97706;--orange:#ea580c;--red:#dc2626;
}
body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;overflow-x:hidden}

/* HEADER */
#h{height:44px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 15px;position:sticky;top:0;z-index:1000}
#h b{font-size:16px;letter-spacing:-0.5px;margin-right:25px;color:var(--t1)}

#nav{display:flex;gap:5px;flex:1}
.nt{padding:0 12px;height:44px;border:none;background:none;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:0.2s}
.nt.active{color:var(--blue);border-bottom-color:var(--blue)}

#h-right{display:flex;align-items:center;gap:15px;font-size:11px;font-weight:500}
#upd{color:var(--t1);font-weight:600}
#cdown{color:var(--t3)}
.pill{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#eee;color:var(--t2)}
.pill.live{background:#dcfce7;color:var(--green)}

/* CONTENU PLEINE LARGEUR */
.pg{padding:20px;width:100%}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi{background:var(--white);padding:15px;border:1px solid var(--border);border-radius:8px}
.kpi div:first-child{font-size:10px;text-transform:uppercase;color:var(--t3);font-weight:700;margin-bottom:4px}
.kpi div:last-child{font-size:22px;font-weight:700}

/* SECTION LANDS 100% WIDTH */
.land-section{margin-bottom:25px}
.land-title{padding:10px 0;font-size:14px;font-weight:700;color:var(--t1);border-bottom:1px solid var(--border2);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.land-title span{font-size:10px;color:var(--t3);font-weight:400}

.card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;width:100%;margin-bottom:15px}
.land-h{padding:8px 15px;background:#fafafa;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue);border-bottom:1px solid var(--border)}

.row{display:grid;grid-template-columns:1fr 80px 60px;align-items:center;padding:12px 15px;border-bottom:1px solid var(--border);cursor:pointer}
.row:hover{background:#f9f9f9}
.row:last-child{border-bottom:none}
.row-name{font-weight:500;font-size:13px}
.row-sr{padding-left:20px;font-size:11px;color:var(--t3);font-style:italic}
.row-st{font-size:10px;color:var(--t3);text-align:right}
.row-wait{text-align:right;font-weight:700;font-size:15px}

/* DETAIL PANEL */
#det-panel{position:fixed;right:-450px;top:44px;bottom:0;width:400px;background:var(--white);border-left:1px solid var(--border);z-index:900;transition:0.3s cubic-bezier(0.4,0,0.2,1);padding:30px;box-shadow:-10px 0 30px rgba(0,0,0,0.05);overflow-y:auto}
#det-panel.open{right:0}
.det-close{position:absolute;top:15px;right:15px;cursor:pointer;font-size:24px;color:var(--t3);line-height:1}

.w-g{color:var(--green)} .w-y{color:var(--yellow)} .w-o{color:var(--orange)} .w-r{color:var(--red)} .w-d{color:var(--t3)}
.page{display:none} .page.active{display:block}
</style>
</head>
<body>

<header id="h">
  <b>DLP</b>
  <div id="nav">
    <button class="nt active" data-p="ov">Console</button>
    <button class="nt" data-p="at">Attractions</button>
    <button class="nt" data-p="ma">Carte Live</button>
    <button class="nt" data-p="st">Statistiques</button>
  </div>
  <div id="h-right">
    <div id="upd">--:--:--</div>
    <div id="cdown">--s</div>
    <span id="st-pill" class="pill">SYNC</span>
  </div>
</header>

<div id="det-panel">
  <span class="det-close" onclick="closeDet()">×</span>
  <p id="det-land" style="font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px"></p>
  <h2 id="det-name" style="font-size:22px; font-weight:700; margin-bottom:25px; line-height:1.2"></h2>
  <div style="background:var(--bg); padding:25px; border-radius:12px; text-align:center; margin-bottom:30px">
    <div style="font-size:10px; color:var(--t3); text-transform:uppercase; font-weight:700; margin-bottom:8px">Temps d'attente actuel</div>
    <div id="det-wait" style="font-size:56px; font-weight:800; line-height:1">--</div>
    <div id="det-status" style="font-size:11px; font-weight:700; margin-top:10px">--</div>
  </div>
  <div style="font-weight:700; font-size:11px; margin-bottom:15px; color:var(--t2)">HISTORIQUE RÉCENT</div>
  <div style="height:200px"><canvas id="det-chart"></canvas></div>
</div>

<div class="page active" id="page-ov">
  <div class="pg">
    <div class="kpi-row">
      <div class="kpi"><div>Affluence estimée</div><div id="k-crowd">--</div></div>
      <div class="kpi"><div>Moyenne Standby</div><div id="k-avg">--</div></div>
      <div class="kpi"><div>Attractions Ouvertes</div><div id="k-open">--</div></div>
    </div>
    
    <div class="land-section">
      <div class="land-title">DISNEYLAND PARK <span id="h-dlp">--</span></div>
      <div id="list-dlp"></div>
    </div>

    <div class="land-section">
      <div class="land-title">DISNEY ADVENTURE WORLD <span id="h-daw">--</span></div>
      <div id="list-daw"></div>
    </div>
  </div>
</div>

<div class="page" id="page-at"><div class="pg"><h3>Fiches Techniques</h3></div></div>
<div class="page" id="page-ma"><div class="pg"><h3>Visualisation Géographique</h3></div></div>
<div class="page" id="page-st"><div class="pg"><h3>Analytiques Avancées</h3></div></div>

<script>
'use strict';

const CONFIG = {
  dlp: [
    {id:2, n:"Indiana Jones™ et le Temple du Péril", land:"Adventureland"},
    {id:7306, n:"Single Rider", land:"Adventureland", sr:true, pid:2},
    {id:3, n:"Pirates of the Caribbean", land:"Adventureland"},
    {id:8, n:"Star Wars Hyperspace Mountain", land:"Discoveryland"},
    {id:7278, n:"Single Rider", land:"Discoveryland", sr:true, pid:8},
    {id:5, n:"Buzz Lightyear Laser Blast", land:"Discoveryland"},
    {id:9, n:"Star Tours: L'Aventure Continue", land:"Discoveryland"},
    {id:25, n:"Big Thunder Mountain", land:"Frontierland"},
    {id:26, n:"Phantom Manor", land:"Frontierland"},
    {id:22, n:"Peter Pan's Flight", land:"Fantasyland"},
    {id:19, n:"it's a small world", land:"Fantasyland"}
  ],
  daw: [
    {id:10845, n:"Spider-Man W.E.B. Adventure", land:"Avengers Campus"},
    {id:10846, n:"Single Rider", land:"Avengers Campus", sr:true, pid:10845},
    {id:10848, n:"Avengers Assemble: Flight Force", land:"Avengers Campus"},
    {id:10849, n:"Single Rider", land:"Avengers Campus", sr:true, pid:10848},
    {id:32, n:"Crush's Coaster", land:"Worlds of Pixar"},
    {id:7277, n:"Single Rider", land:"Worlds of Pixar", sr:true, pid:32},
    {id:37, n:"Ratatouille: L'Aventure Totalement Toquée", land:"Worlds of Pixar"},
    {id:7279, n:"Single Rider", land:"Worlds of Pixar", sr:true, pid:37},
    {id:40, n:"The Twilight Zone Tower of Terror", land:"World Premiere Plaza"},
    {id:34, n:"RC Racer", land:"Worlds of Pixar"},
    {id:10853, n:"Raiponce Tangled Spin", land:"Adventure Way"}
  ]
};

let rides = [], timer = 15, isLive = false, myChart = null;

async function fetchAPI(url) {
  const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`
  ];
  
  for(let p of proxies) {
    try {
      const r = await fetch(p(url), { signal: AbortSignal.timeout(8000) });
      const d = await r.json();
      return d.contents ? JSON.parse(d.contents) : d;
    } catch(e) { continue; }
  }
  return null;
}

async function refresh() {
  const d1 = await fetchAPI('https://queue-times.com/parks/4/queue_times.json');
  const d2 = await fetchAPI('https://queue-times.com/parks/28/queue_times.json');

  if(d1 && d2) {
    const all = [...(d1.rides||[]), ...(d2.rides||[])];
    [d1, d2].forEach(p => p.lands?.forEach(l => all.push(...l.rides)));

    rides = [...CONFIG.dlp, ...CONFIG.daw].map(c => {
      const live = all.find(x => x.id === c.id);
      return {...c, wait: live?live.wait_time:0, open: live?live.is_open:false};
    });
    isLive = true;
  } else {
    isLive = false;
    if(rides.length === 0) loadDemo();
  }
  render();
}

function loadDemo() {
  rides = [...CONFIG.dlp, ...CONFIG.daw].map(c => ({...c, wait: Math.floor(Math.random()*50), open: Math.random()>0.1}));
}

function render() {
  document.getElementById('upd').textContent = new Date().toLocaleTimeString();
  const pill = document.getElementById('st-pill');
  pill.textContent = isLive ? "LIVE" : "DÉCONNECTÉ";
  pill.className = isLive ? "pill live" : "pill";

  renderList('dlp', 'list-dlp');
  renderList('daw', 'list-daw');
  
  const op = rides.filter(r => r.open && !r.sr);
  const avg = op.length ? Math.round(op.reduce((a,b)=>a+b.wait,0)/op.length) : 0;
  document.getElementById('k-avg').textContent = avg + " min";
  document.getElementById('k-open').textContent = op.length + " / " + rides.filter(x=>!x.sr).length;
  document.getElementById('k-crowd').textContent = avg > 40 ? "Saturée" : avg > 20 ? "Modérée" : "Fluide";
}

function renderList(p, target) {
  const cont = document.getElementById(target);
  const parkRides = rides.filter(r => r.park === p && !r.sr);
  const lands = [...new Set(parkRides.map(r => r.land))];
  let h = "";
  lands.forEach(l => {
    h += `<div class="card"><div class="land-h">${l}</div>`;
    parkRides.filter(r => r.land === l).forEach(r => {
      h += `<div class="row" onclick="openDet(${r.id})">
        <div class="row-name">${r.n}</div>
        <div class="row-st">${r.open?'OUVERT':'<span class="w-r">FERMÉ</span>'}</div>
        <div class="row-wait ${getWCl(r.wait)}">${r.open?r.wait:'--'}</div>
      </div>`;
      const sr = rides.find(s => s.sr && s.pid === r.id);
      if(sr) h += `<div class="row" onclick="openDet(${sr.id})">
        <div class="row-name row-sr">↳ Single Rider</div>
        <div class="row-st">${sr.open?'OUVERT':'FERMÉ'}</div>
        <div class="row-wait ${getWCl(sr.wait)}">${sr.open?sr.wait:'--'}</div>
      </div>`;
    });
    h += `</div>`;
  });
  cont.innerHTML = h;
}

function getWCl(w) { return w<15?'w-g':w<30?'w-y':w<50?'w-o':'w-r'; }

function openDet(id) {
  const r = rides.find(x => x.id === id);
  const p = document.getElementById('det-panel');
  p.classList.add('open');
  document.getElementById('det-name').textContent = r.n;
  document.getElementById('det-land').textContent = r.land;
  document.getElementById('det-wait').textContent = r.open ? r.wait + " min" : "FERMÉ";
  document.getElementById('det-wait').className = getWCl(r.wait);
  document.getElementById('det-status').textContent = r.open ? "OPÉRATIONNELLE" : "ACTUELLEMENT INDISPONIBLE";
  document.getElementById('det-status').style.color = r.open ? "var(--green)" : "var(--red)";
  
  if(myChart) myChart.destroy();
  const ctx = document.getElementById('det-chart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['-2h','-1h30','-1h','-30m','NOW'],
      datasets: [{
        data: [Math.max(0,r.wait-5), Math.max(0,r.wait+10), Math.max(0,r.wait-2), Math.max(0,r.wait+5), r.wait],
        borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.05)', tension: 0.4, fill: true, pointRadius: 4, pointBackgroundColor: '#fff'
      }]
    },
    options: { 
      responsive: true, 
      maintainAspectRatio: false, 
      plugins: { legend: { display: false } }, 
      scales: { y: { beginAtZero: true, grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } 
    }
  });
}

function closeDet() { document.getElementById('det-panel').classList.remove('open'); }

// NAVIGATION
document.querySelectorAll('.nt').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.nt').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('page-'+b.dataset.p).classList.add('active');
    if(b.dataset.p !== 'ov') closeDet();
  }
});

// BOUCLE DE SYNCHRONISATION
setInterval(() => {
  timer--;
  if(timer <= 0) { timer = 15; refresh(); }
  document.getElementById('cdown').textContent = timer + "s";
}, 1000);

refresh();
</script>
</body>
</html>
