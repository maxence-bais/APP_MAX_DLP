<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--white:#fff;--border:#e2e2e2;
  --t1:#111;--t2:#555;--t3:#999;--blue:#2563eb;
  --green:#16a34a;--orange:#ea580c;--red:#dc2626;
}
body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;line-height:1.4}

/* HEADER */
#h{height:44px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 15px;position:sticky;top:0;z-index:100}
#h b{font-size:16px;letter-spacing:-0.5px;margin-right:20px}
.pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;background:#eee}
.pill.live{background:#dcfce7;color:var(--green)}

/* NAVIGATION GAUCHE */
#nav-container{display:flex;align-items:center;flex:1}
.nt{padding:0 12px;height:44px;border:none;background:none;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:0.2s}
.nt:hover{color:var(--t1)}
.nt.active{color:var(--blue);border-bottom-color:var(--blue)}

/* INFOS DROITE */
#h-right{display:flex;align-items:center;gap:15px;font-size:11px;color:var(--t3);font-weight:500}
#upd{color:var(--t1);font-weight:600}

/* LAYOUT */
.pg{padding:20px;max-width:1400px;margin:0 auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi{background:var(--white);padding:15px;border:1px solid var(--border);border-radius:8px}
.kpi div:first-child{font-size:10px;text-transform:uppercase;color:var(--t3);font-weight:600;margin-bottom:5px}
.kpi div:last-child{font-size:22px;font-weight:700}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

/* CARTES ET LISTES */
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-h{padding:12px 15px;background:#fafafa;border-bottom:1px solid var(--border);font-weight:600;font-size:12px}
.land-h{padding:6px 15px;background:#fdfdfd;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--blue);border-bottom:1px solid var(--border)}

.row{display:grid;grid-template-columns:1fr 60px;align-items:center;padding:10px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:0.1s}
.row:hover{background:#f9f9f9}
.row:last-child{border-bottom:none}
.row-name{font-weight:500}
.row-sr{padding-left:20px;font-size:11px;color:var(--t3)}
.row-wait{text-align:right;font-weight:700;font-size:14px}

/* DETAIL PANEL */
#det-panel{position:fixed;right:-400px;top:44px;bottom:0;width:400px;background:var(--white);border-left:1px solid var(--border);z-index:90;transition:0.3s ease;padding:25px;box-shadow:-5px 0 15px rgba(0,0,0,0.05);overflow-y:auto}
#det-panel.open{right:0}
.det-close{position:absolute;top:15px;right:15px;cursor:pointer;font-size:20px;color:var(--t3)}

/* COULEURS ATTENTE */
.w-g{color:var(--green)} .w-y{color:#d97706} .w-o{color:var(--orange)} .w-r{color:var(--red)} .w-d{color:var(--t3)}

.page{display:none} .page.active{display:block}
</style>
</head>
<body>

<header id="h">
  <b>DLP</b>
  <div id="nav-container">
    <button class="nt active" data-p="ov">Console</button>
    <button class="nt" data-p="at">Attractions</button>
    <button class="nt" data-p="ma">Carte Live</button>
    <button class="nt" data-p="st">Statistiques</button>
  </div>
  <div id="h-right">
    <div id="upd">--:--:--</div>
    <div id="cdown">Prochaine sync : --s</div>
    <span id="st-pill" class="pill">SYNC...</span>
  </div>
</header>

<div id="det-panel">
  <span class="det-close" onclick="closeDet()">×</span>
  <p id="det-land" style="font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; margin-bottom:5px"></p>
  <h2 id="det-name" style="font-size:20px; margin-bottom:20px"></h2>
  <div style="background:var(--bg); padding:20px; border-radius:8px; text-align:center; margin-bottom:25px">
    <div style="font-size:11px; color:var(--t3); text-transform:uppercase; font-weight:600">Temps d'attente</div>
    <div id="det-wait" style="font-size:48px; font-weight:800">--</div>
    <div id="det-status" style="font-size:11px; font-weight:700">--</div>
  </div>
  <div style="height:180px; margin-bottom:20px"><canvas id="det-chart"></canvas></div>
  <div id="det-info" style="font-size:12px; color:var(--t2)"></div>
</div>

<div class="page active" id="page-ov">
  <div class="pg">
    <div class="kpi-row">
      <div class="kpi"><div>Affluence</div><div id="k-crowd">--</div></div>
      <div class="kpi"><div>Moyenne Parc</div><div id="k-avg">--</div></div>
      <div class="kpi"><div>Ouvertes</div><div id="k-open">--</div></div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-h">DISNEYLAND PARK</div>
        <div id="list-dlp"></div>
      </div>
      <div class="card">
        <div class="card-h">DISNEY ADVENTURE WORLD</div>
        <div id="list-daw"></div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-at"><div class="pg"><h3>Liste des attractions</h3></div></div>
<div class="page" id="page-ma"><div class="pg"><h3>Carte Live</h3></div></div>
<div class="page" id="page-st"><div class="pg"><h3>Statistiques</h3></div></div>

<script>
'use strict';

const CONFIG = {
  dlp: [
    {id:2, n:"Indiana Jones™", land:"Adventureland"},
    {id:7306, n:"Indiana Jones (Single)", land:"Adventureland", sr:true, pid:2},
    {id:3, n:"Pirates of the Caribbean", land:"Adventureland"},
    {id:8, n:"Star Wars Hyperspace Mtn", land:"Discoveryland"},
    {id:7278, n:"Hyperspace Mtn (Single)", land:"Discoveryland", sr:true, pid:8},
    {id:5, n:"Buzz Lightyear Laser Blast", land:"Discoveryland"},
    {id:25, n:"Big Thunder Mountain", land:"Frontierland"},
    {id:22, n:"Peter Pan's Flight", land:"Fantasyland"},
    {id:26, n:"Phantom Manor", land:"Frontierland"}
  ],
  daw: [
    {id:10845, n:"Spider-Man W.E.B. Adventure", land:"Avengers Campus"},
    {id:10846, n:"Spider-Man (Single)", land:"Avengers Campus", sr:true, pid:10845},
    {id:10848, n:"Avengers Assemble: Flight Force", land:"Avengers Campus"},
    {id:32, n:"Crush's Coaster", land:"Worlds of Pixar"},
    {id:7277, n:"Crush's Coaster (Single)", land:"Worlds of Pixar", sr:true, pid:32},
    {id:37, n:"Ratatouille: L'Aventure", land:"Worlds of Pixar"},
    {id:40, n:"Tower of Terror", land:"Production Courtyard"},
    {id:34, n:"RC Racer", land:"Worlds of Pixar"},
    {id:31, n:"Slinky Dog Zigzag Spin", land:"Worlds of Pixar"},
    {id:29, n:"Flying Carpets Over Agrabah", land:"Toon Studio"}
  ]
};

let rides = [], timer = 15, isLive = false, myChart = null;

async function refresh() {
  const proxy = "https://api.allorigins.win/get?url=";
  const u1 = encodeURIComponent('https://queue-times.com/parks/4/queue_times.json');
  const u2 = encodeURIComponent('https://queue-times.com/parks/28/queue_times.json');

  try {
    const [r1, r2] = await Promise.all([fetch(proxy+u1), fetch(proxy+u2)]);
    const d1 = JSON.parse((await r1.json()).contents);
    const d2 = JSON.parse((await r2.json()).contents);
    const all = [...(d1.rides||[]), ...(d2.rides||[])];
    [d1, d2].forEach(p => p.lands?.forEach(l => all.push(...l.rides)));

    rides = [...CONFIG.dlp, ...CONFIG.daw].map(c => {
      const live = all.find(x => x.id === c.id);
      return {...c, wait: live?live.wait_time:0, open: live?live.is_open:false};
    });
    isLive = true;
  } catch(e) {
    rides = [...CONFIG.dlp, ...CONFIG.daw].map(c => ({...c, wait: Math.floor(Math.random()*40), open: true}));
    isLive = false;
  }
  render();
}

function render() {
  document.getElementById('upd').textContent = new Date().toLocaleTimeString();
  const pill = document.getElementById('st-pill');
  pill.textContent = isLive ? "LIVE" : "DEMO";
  pill.className = isLive ? "pill live" : "pill";

  renderList('dlp', 'list-dlp');
  renderList('daw', 'list-daw');
  
  const op = rides.filter(r => r.open && !r.sr);
  const avg = op.length ? Math.round(op.reduce((a,b)=>a+b.wait,0)/op.length) : 0;
  document.getElementById('k-avg').textContent = avg + " min";
  document.getElementById('k-open').textContent = op.length;
  document.getElementById('k-crowd').textContent = avg > 30 ? "Élevée" : "Calme";
}

function renderList(p, target) {
  const cont = document.getElementById(target);
  const parkRides = rides.filter(r => r.park === p && !r.sr);
  const lands = [...new Set(parkRides.map(r => r.land))];
  let h = "";
  lands.forEach(l => {
    h += `<div class="land-h">${l}</div>`;
    parkRides.filter(r => r.land === l).forEach(r => {
      h += `<div class="row" onclick="openDet(${r.id})">
        <div class="row-name">${r.n}</div>
        <div class="row-wait ${getWCl(r.wait)}">${r.open?r.wait:'--'}</div>
      </div>`;
      const sr = rides.find(s => s.sr && s.pid === r.id);
      if(sr) h += `<div class="row" onclick="openDet(${sr.id})">
        <div class="row-name row-sr">↳ Single Rider</div>
        <div class="row-wait ${getWCl(sr.wait)}">${sr.open?sr.wait:'--'}</div>
      </div>`;
    });
  });
  cont.innerHTML = h;
}

function getWCl(w) { return w<15?'w-g':w<35?'w-y':w<55?'w-o':'w-r'; }

function openDet(id) {
  const r = rides.find(x => x.id === id);
  const p = document.getElementById('det-panel');
  p.classList.add('open');
  document.getElementById('det-name').textContent = r.n;
  document.getElementById('det-land').textContent = r.land;
  document.getElementById('det-wait').textContent = r.open ? r.wait + " min" : "Fermé";
  document.getElementById('det-wait').className = getWCl(r.wait);
  document.getElementById('det-status').textContent = r.open ? "OUVERT" : "INDISPONIBLE";
  document.getElementById('det-status').style.color = r.open ? "var(--green)" : "var(--red)";
  
  if(myChart) myChart.destroy();
  const ctx = document.getElementById('det-chart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['10h','12h','14h','16h','18h','20h'],
      datasets: [{
        data: [Math.max(0, r.wait-10), r.wait+5, r.wait, Math.max(0, r.wait-5), r.wait+10, r.wait],
        borderColor: '#2563eb', tension: 0.3, fill: false, pointRadius: 0
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
}

function closeDet() { document.getElementById('det-panel').classList.remove('open'); }

// NAV
document.querySelectorAll('.nt').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.nt').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('page-'+b.dataset.p).classList.add('active');
  }
});

// TIMER
setInterval(() => {
  timer--;
  if(timer <= 0) { timer = 15; refresh(); }
  document.getElementById('cdown').textContent = `Prochaine sync : ${timer}s`;
}, 1000);

refresh();
</script>
</body>
</html>
